<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <title>Cavo SMS - Bulk Message Sender</title>
    <meta name="description" content="Send bulk SMS messages with scheduling, templates, and analytics. Install on your phone for the best experience." />
    <meta name="author" content="Lovable" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cavo SMS" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Cavo SMS - Bulk Message Sender" />
    <meta property="og:description" content="Send bulk SMS messages with scheduling, templates, and analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <style>
      :root {
        color-scheme: light;
        background: #ffffff;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
      }

      body {
        font-family: Inter, system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      #app-bootstrap {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #ffffff;
        transition: opacity 300ms ease, visibility 300ms ease;
      }

      #app-bootstrap.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-bootstrap__brand img {
        width: 176px;
        height: auto;
        object-fit: contain;
      }

      .app-bootstrap__indicator {
        margin-top: 24px;
        width: 32px;
        height: 32px;
        border: 3px solid rgba(123, 235, 120, 0.2);
        border-top-color: #7BEB78;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
      <div id="app-bootstrap" aria-hidden="true">
      <div class="app-bootstrap__brand"><img src="./logo.png" alt="Cavo SMS" /></div>
      <div class="app-bootstrap__indicator"></div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideAppBootstrap = function () {
        const splash = document.getElementById('app-bootstrap');
        if (!splash || splash.dataset.hidden === 'true') return;
        splash.dataset.hidden = 'true';
        splash.classList.add('is-hidden');
        window.setTimeout(function () {
          splash.remove();
        }, 260);
      };

      window.addEventListener('app-ready', function () {
        window.__hideAppBootstrap();
      }, { once: true });

      window.setTimeout(function () {
        window.__hideAppBootstrap();
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
